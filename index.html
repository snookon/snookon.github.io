<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать Антология.pdf</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Чтобы не было прокрутки при видео */
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 90%;
            max-width: 450px; /* Немного шире для рекламы */
            z-index: 10;
        }

        h2 { color: #333; font-size: 1.4rem; margin-bottom: 10px; }
        p.file-info { color: #777; font-size: 0.9rem; margin-bottom: 30px; }

        #download-btn {
            background-color: #4A90E2; 
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 30px; /* Отступ до рекламы */
        }

        #download-btn:hover { background-color: #357ABD; transform: translateY(-2px); }

        .download-icon { width: 22px; height: 22px; fill: currentColor; }

        /* !!! НОВЫЙ БЛОК РЕКЛАМЫ !!! */
        .ads-section {
            border-top: 1px solid #eee;
            padding-top: 15px;
            text-align: left;
        }

        .ads-header {
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            margin-left: 5px;
        }

        .ads-line {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            flex-wrap: wrap; /* Для мобильных */
        }

        .ad-item {
            flex: 1 1 calc(33.33% - 10px);
            max-width: 100px;
            text-align: center;
            cursor: default; /* Не кликабельны */
        }

        .ad-item img {
            width: 100px; /* Принудительно квадратные */
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .ad-caption {
            font-size: 0.75rem;
            color: #555;
            margin-top: 5px;
            line-height: 1.2;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3; /* Ограничиваем 3 строками */
            -webkit-box-orient: vertical;
        }

        /* Адаптация для рекламы на совсем маленьких экранах */
        @media (max-width: 400px) {
            .ad-item {
                flex: 1 1 calc(50% - 10px);
            }
        }

        /* Контейнер для видео */
        #video-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
        }

        #rick-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="container" id="ui-container">
        <h2>Файл готов к скачиванию</h2>
        <p class="file-info">Антология.pdf • 14.2 MB</p>
        
        <button id="download-btn">
            <svg class="download-icon" viewBox="0 0 24 24">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            Скачать файл "Антология.pdf"
        </button>

        <div class="ads-section">
            <div class="ads-header">Рекомендуемые материалы</div>
            <div class="ads-line">
                <div class="ad-item">
                    <img src="https://via.placeholder.com/100/FFF/555?text=Сода" alt="Soda ad">
                    <p class="ad-caption">5 ложек соды утром и живот исчезнет за неделю!</p>
                </div>
                <div class="ad-item">
                    <img src="https://via.placeholder.com/100/FFF/555?text=Пенсионерка" alt="Rich ad">
                    <p class="ad-caption">Пенсионерка из Самары разбогатела на этом...</p>
                </div>
                <div class="ad-item">
                    <img src="https://via.placeholder.com/100/FFF/555?text=Сустав" alt="Joint ad">
                    <p class="ad-caption">Этот копеечный способ лечит суставы за 3 дня...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="video-container">
        <video id="rick-video" preload="auto">
            <source src="RR.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>
    </div>

    <script>
        const btn = document.getElementById('download-btn');
        const videoContainer = document.getElementById('video-container');
        const video = document.getElementById('rick-video');
        const ui = document.getElementById('ui-container');

        btn.addEventListener('click', function() {
            // Скрываем интерфейс (кнопку и рекламу)
            ui.style.display = 'none';
            
            // Показываем контейнер с видео
            videoContainer.style.display = 'block';

            // Запускаем видео
            video.play().catch(error => {
                console.log("Автозапуск заблокирован браузером", error);
            });

            // Попытка полноэкранного режима
            if (videoContainer.requestFullscreen) {
                videoContainer.requestFullscreen();
            } else if (videoContainer.webkitRequestFullscreen) {
                videoContainer.webkitRequestFullscreen();
            }
        });
    </script>

</body>
</html>
