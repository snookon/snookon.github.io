<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать Антология.pdf</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Чтобы не было прокрутки при видео */
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        h2 { color: #333; font-size: 1.4rem; margin-bottom: 10px; }
        p.file-info { color: #777; font-size: 0.9rem; margin-bottom: 30px; }

        #download-btn {
            background-color: #4A90E2; 
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
            transition: all 0.2s;
            width: 100%;
        }

        #download-btn:hover { background-color: #357ABD; transform: translateY(-2px); }

        .download-icon { width: 22px; height: 22px; fill: currentColor; }

        /* Контейнер для видео */
        #video-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
        }

        /* Настройки самого видео для авто-подстройки под экран */
        #rick-video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Видео заполнит весь экран без черных полос */
        }
    </style>
</head>
<body>

    <div class="container" id="ui-container">
        <h2>Файл готов к скачиванию</h2>
        <p class="file-info">Антология.pdf • 14.2 MB</p>
        
        <button id="download-btn">
            <svg class="download-icon" viewBox="0 0 24 24">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            Скачать файл "Антология.pdf"
        </button>
    </div>

    <div id="video-container">
        <video id="rick-video" preload="auto">
            <source src="RR.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>
    </div>

    <script>
        const btn = document.getElementById('download-btn');
        const videoContainer = document.getElementById('video-container');
        const video = document.getElementById('rick-video');
        const ui = document.getElementById('ui-container');

        btn.addEventListener('click', function() {
            // Скрываем интерфейс
            ui.style.display = 'none';
            
            // Показываем контейнер с видео
            videoContainer.style.display = 'block';

            // Запускаем видео
            video.play().catch(error => {
                console.log("Автозапуск заблокирован браузером", error);
            });

            // Разворачиваем видео на весь экран (опционально, для большего эффекта)
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) { /* Safari */
                video.webkitRequestFullscreen();
            }
        });
    </script>

</body>
</html>
