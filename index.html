<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать файл "Антология.pdf"</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        /* Основной контейнер */
        .container {
            text-align: center;
            background: white;
            padding: 40px 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 500px;
            z-index: 10;
        }

        h2 { color: #333; font-size: 1.3rem; margin-bottom: 5px; }
        .file-info { color: #888; font-size: 0.85rem; margin-bottom: 30px; }

        /* Та самая торрент-кнопка */
        #download-btn {
            background-color: #4A90E2; /* Нежно-синий */
            color: white;
            border: none;
            padding: 18px 25px;
            font-size: 1.1rem;
            border-radius: 40px; /* Скругленные края */
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 40px;
            text-decoration: none;
        }

        #download-btn:hover {
            background-color: #357ABD;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 144, 226, 0.4);
        }

        .download-icon { width: 24px; height: 24px; fill: currentColor; }

        /* Блок тизерной рекламы */
        .ads-section {
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
            text-align: left;
        }

        .ads-header {
            font-size: 0.7rem;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .ads-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .ad-item {
            text-align: left;
            cursor: pointer;
        }

        .ad-item img {
            width: 100%;
            aspect-ratio: 1/1; /* Принудительный квадрат */
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        .ad-caption {
            font-size: 0.75rem;
            color: #444;
            margin-top: 6px;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 4; /* Текст обрезается после 4 строки */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Видео-сюрприз */
        #video-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
        }

        #rick-video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Заполняет экран на ПК и телефоне */
        }

        /* Адаптивность для мобилок */
        @media (max-width: 480px) {
            .container { padding: 30px 15px; }
            #download-btn { font-size: 1rem; padding: 15px; }
            .ad-caption { font-size: 0.65rem; }
        }
    </style>
</head>
<body>

    <div class="container" id="ui-page">
        <h2>Файл готов к скачиванию</h2>
        <p class="file-info">Антология.pdf (14.2 MB)</p>
        
        <button id="download-btn">
            <svg class="download-icon" viewBox="0 0 24 24">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            Скачать файл "Антология.pdf"
        </button>

        <div class="ads-section">
            <div class="ads-header">Вам может быть интересно</div>
            <div class="ads-grid">
                <div class="ad-item">
                    <img src="001.png" alt="Ad 1">
                    <p class="ad-caption">5 ложек соды утром и живот исчезнет за неделю!</p>
                </div>
                <div class="ad-item">
                    <img src="002.png" alt="Ad 2">
                    <p class="ad-caption">Пенсионерка из Самары разбогатела на этом...</p>
                </div>
                <div class="ad-item">
                    <img src="003.png" alt="Ad 3">
                    <p class="ad-caption">ОБЗОР НА ЗАТЕКСТУРНЫЙ КОНТЕТ В VOTV! [Voices Of The Void...]</p>
                </div>
            </div>
        </div>
    </div>

    <div id="video-container">
        <video id="rick-video" playsinline>
            <source src="RR.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const btn = document.getElementById('download-btn');
        const videoWrap = document.getElementById('video-container');
        const video = document.getElementById('rick-video');
        const ui = document.getElementById('ui-page');

        btn.addEventListener('click', function() {
            // Убираем всё лишнее
            ui.style.display = 'none';
            videoWrap.style.display = 'block';

            // Запускаем видео
            video.play();

            // Пытаемся развернуть на весь экран
            if (videoWrap.requestFullscreen) {
                videoWrap.requestFullscreen();
            } else if (videoWrap.webkitRequestFullscreen) {
                videoWrap.webkitRequestFullscreen();
            }
        });

        // Если видео закончится (вдруг), можно вернуть страницу назад, 
        // но для пранка лучше оставить черный экран.
    </script>

</body>
</html>
