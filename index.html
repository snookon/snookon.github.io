        }

        .container {

            background: white;

            box-shadow: 0 4px 20px rgba(0,0,0,0.08);

        h2 { color: #333; font-size: 1.4rem; margin-bottom: 8px; }
        p.file-info { color: #777; font-size: 0.9rem; margin-bottom: 30px; }

        /* Та самая синяя кнопка торрент-стиля */
        #download-btn {

        .ads-section {

        }

        .ad-item {
            flex: 1;
            max-width: 32%;
            text-align: left;
        }

        .ad-item img {
            width: 100%;
            aspect-ratio: 1 / 1; /* Делаем их идеально квадратными */
            object-fit: cover;
            border-radius: 6px;
            background-color: #eee;
            display: block;
        }

        .ad-caption {
            font-size: 0.7rem;
            color: #444;
            margin-top: 8px;
            line-height: 1.3;
            font-weight: 500;
            /* Обрезка текста до 4 строк */
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Видео во весь экран */
        #video-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
        }

        #rick-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Адаптация для мобильных */
        @media (max-width: 450px) {
            .ad-caption { font-size: 0.65rem; }
            .container { padding: 30px 15px; }
        }
    </style>
</head>
